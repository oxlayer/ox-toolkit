services:
  verdaccio:
    image: verdaccio/verdaccio:latest
    container_name: oxlayer-registry
    ports:
      - "4873:4873"
    volumes:
      - ./verdaccio/config.yaml:/verdaccio/config.yaml:ro
      - verdaccio-storage:/verdaccio/storage
      - verdaccio-plugins:/verdaccio/plugins
    environment:
      - VERDACCIO_PORT=4873
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4873/-/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  verdaccio-storage:
  verdaccio-plugins:
