# OpenTelemetry Collector - Domain Events Pipeline
# Purpose: Receives business/domain signals (domain events, business metrics) and sends to ClickHouse
# Intended for: Analytics, business intelligence, product metrics

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Batching improves throughput and reduces backend load
  batch:
    timeout: 5s
    send_batch_size: 10000
    send_batch_max_size: 11000

  # Enrich all signals with environment info
  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert
      - key: collector.intent
        value: domain
        action: upsert

exporters:
  # Domain events -> ClickHouse via native TCP protocol
  clickhouse/domain_events:
    endpoint: tcp://clickhouse:9000
    database: analytics
    username: default
    password: default
    ttl: 5s
    timeout: 10s
    # Table: domain_events (created by init script)
    # Expected schema matches OTEL log data model
    metrics_table_name: otel_logs
    # The table should have columns for:
    # - Timestamp, body, attributes (JSON), trace_id, span_id, etc.

  # Business metrics -> ClickHouse via native TCP protocol
  clickhouse/business_metrics:
    endpoint: tcp://clickhouse:9000
    database: analytics
    username: default
    password: default
    ttl: 5s
    timeout: 10s
    # Table: business_metrics (created by init script)
    # Expected schema matches OTEL metrics data model

  # Debug exporter (dev only)
  debug:
    verbosity: detailed

service:
  pipelines:
    # Domain events pipeline - business analytics
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters:
        - clickhouse/domain_events
        - debug

    # Business metrics pipeline - KPIs, product metrics
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters:
        - clickhouse/business_metrics
        - debug
