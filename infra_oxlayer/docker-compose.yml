  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: oxlayer-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oxlayer-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: oxlayer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oxlayer-network

  # RabbitMQ Event Bus
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: oxlayer-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oxlayer-network

  # Keycloak Authentication Server
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: oxlayer-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      # Disable secure cookie flag for HTTP development (allow cookies without HTTPS)
      KC_SPI_OPTIONS_COOKIE_DEFAULT_SECURE: "false"
      KC_SPI_OPTIONS_COOKIE_DEFAULT_SAME_SITE: "lax"
    # Expose only to network - nginx proxy will handle external access
    expose:
      - "8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost:8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - oxlayer-network

  # Nginx reverse proxy for Keycloak (adds CORP header for COEP compliance)
  keycloak-proxy:
    image: nginx:alpine
    container_name: oxlayer-keycloak-proxy
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./nginx-keycloak.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - oxlayer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/realms/oxlayer/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Keycloak Database
  keycloak-postgres:
    image: postgres:16-alpine
    container_name: oxlayer-keycloak-postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oxlayer-network

