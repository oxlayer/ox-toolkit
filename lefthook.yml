# Lefthook config — fast git hooks runner
# https://lefthook.dev
#
# Pre-commit: only lint staged files (must be fast).
# Pre-push: heavier checks before sharing.

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxlint {staged_files}

pre-push:
  parallel: true
  commands:
    # Both blocking now — repo is at 0 lint errors, 0 typecheck errors.
    # If a regression slips in, the push fails. Use `cortex check` for
    # the full per-package report.
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck
