# Lefthook config — fast git hooks runner
# https://lefthook.dev
#
# Pre-commit: only lint staged files (must be fast).
# Pre-push: heavier checks before sharing.

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxlint {staged_files}

pre-push:
  parallel: true
  commands:
    # Lint blocks the push — fast and rules-only, no excuses for failures.
    lint:
      run: bun run lint
    # Typecheck runs but does not block. The repo has tracked code-level
    # type drift; CI is the gate. Remove this `tags: [warn]` once the
    # remaining errors are resolved so pre-push fails on regressions.
    typecheck:
      tags: [warn]
      run: bun run typecheck || (echo "⚠ typecheck has errors (non-blocking pre-push). Run cortex check for details." && exit 0)
