# Lefthook config — fast git hooks runner
# https://lefthook.dev
#
# Pre-commit: only lint staged files (must be fast).
# Pre-push: heavier checks before sharing.

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxlint {staged_files}

pre-push:
  parallel: true
  commands:
    # Both lint and typecheck currently carry pre-existing backlog
    # (252 lint errors, 107 typecheck errors). They run for visibility
    # but do not block the push — CI is the gate of record. Remove the
    # `|| exit 0` shims once the backlogs are drained so regressions
    # block again. See `cortex check` for the full report.
    lint:
      tags: [warn]
      run: bun run lint || (echo "⚠ lint has errors (non-blocking pre-push). Run cortex check for details." && exit 0)
    typecheck:
      tags: [warn]
      run: bun run typecheck || (echo "⚠ typecheck has errors (non-blocking pre-push). Run cortex check for details." && exit 0)
