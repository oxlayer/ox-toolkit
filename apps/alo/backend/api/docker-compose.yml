services:
  # Alo Manager API (Development)
  # Uncomment to run in Docker
  # alo-manager:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
  #   container_name: alo-manager-api
  #   environment:
  #     # Server Configuration
  #     PORT: 3001
  #     HOST: 0.0.0.0
  #     NODE_ENV: development

  #     # Keycloak Authentication
  #     KEYCLOAK_ENABLED: "true"
  #     KEYCLOAK_SERVER_URL: http://keycloak:8080
  #     KEYCLOAK_REALM: alo
  #     KEYCLOAK_CLIENT_ID: alo-manager

  #     # JWT Fallback
  #     JWT_SECRET: your-secret-key-change-in-production

  #     # PostgreSQL Database
  #     POSTGRES_HOST: postgres
  #     POSTGRES_PORT: 5432
  #     POSTGRES_DATABASE: alo_manager
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres

  #     # Redis Cache
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     REDIS_PASSWORD:
  #     REDIS_DB: 0

  #     # RabbitMQ Event Bus
  #     RABBITMQ_HOST: rabbitmq
  #     RABBITMQ_PORT: 5672
  #     RABBITMQ_USERNAME: guest
  #     RABBITMQ_PASSWORD: guest
  #     RABBITMQ_VHOST: /
  #     RABBITMQ_QUEUE: alo.manager.events
  #   ports:
  #     - "3001:3001"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy
  #     keycloak:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #   networks:
  #     - alo-network
  #   restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: alo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alo_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alo-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: alo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alo-network

  # RabbitMQ Event Bus
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: alo-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alo-network

  # Keycloak Authentication Server
  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: alo-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KC_SPI_OPTIONS_COOKIE_DEFAULT_SECURE: "false"
      KC_SPI_OPTIONS_COOKIE_DEFAULT_SAME_SITE: "lax"
    expose:
      - "8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - alo-network

  # Keycloak Bootstrap Service - creates realm and clients on startup
  keycloak-bootstrap:
    image: node:20-alpine
    container_name: alo-keycloak-bootstrap
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak.config.json:/app/keycloak.config.json:ro
      - ../../backend/cli/keycloak-bootstrap:/app/cli:ro
    working_dir: /app/cli
    command: >
      sh -c "
        echo 'Installing keycloak-bootstrap CLI...' &&
        npm install &&
        echo 'Waiting for Keycloak to be ready...' &&
        until wget --quiet --tries=1 --spider http://keycloak:8080/health/ready; do
          echo 'Keycloak not ready yet, waiting...'
          sleep 5
        done &&
        echo 'Keycloak is ready, bootstrapping...' &&
        npx keycloak-bootstrap bootstrap --config /app/keycloak.config.json &&
        echo 'Bootstrap completed successfully!'
      "
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - alo-network
    restart: "no"

  # Nginx reverse proxy for Keycloak
  keycloak-proxy:
    image: nginx:alpine
    container_name: alo-keycloak-proxy
    ports:
      - "8080:8080"
    volumes:
      - ./nginx-keycloak.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      keycloak-bootstrap:
        condition: service_completed_successfully
    networks:
      - alo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/realms/alo/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Keycloak Database
  keycloak-postgres:
    image: postgres:16-alpine
    container_name: alo-keycloak-postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alo-network

  # Grafana (visualization for metrics and logs)
  grafana:
    image: grafana/grafana:12.3.1
    container_name: alo-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=https://github.com/quickwit-oss/quickwit-datasource/releases/download/v0.5.0/quickwit-quickwit-datasource-0.5.0.zip;quickwit
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - alo-network
    restart: unless-stopped

  # Prometheus (metrics collection and storage)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: alo-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - alo-network
    restart: unless-stopped

  # OTEL Collector - Observability pipeline
  otel-collector-observability:
    image: otel/opentelemetry-collector-contrib:0.143.0
    container_name: alo-otel-collector-observability
    command: [--config=/etc/collector-observability.yaml]
    ports:
      - "14317:4317"
      - "14318:4318"
      - "8888:8888"
    volumes:
      - ./collector-observability.yaml:/etc/collector-observability.yaml:ro
    networks:
      - alo-network
    restart: unless-stopped
    depends_on:
      - quickwit

  # Quickwit (log search and analytics engine)
  quickwit:
    image: quickwit/quickwit:0.8.2
    container_name: alo-quickwit
    command: ["run"]
    ports:
      - "7280:7280"
      - "7281:7281"
    environment:
      - QW_METASTORE_URI=file:///quickwit/data/qw.metastore
      - QW_DATA_DIR=/quickwit/data
      - QW_JAEGER_STORAGE_ENABLED=true
    volumes:
      - quickwit_data:/quickwit/data
    networks:
      - alo-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:7280/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Jaeger Query UI
  jaeger-query:
    image: jaegertracing/jaeger-query:1.52
    ports:
      - 16686:16686
      - 16687:16687
    environment:
      - SPAN_STORAGE_TYPE=grpc-plugin
      - GRPC_STORAGE_SERVER=quickwit:7281
      - GRPC_STORAGE_TLS=false
    networks:
      - alo-network
    restart: unless-stopped

  # ClickHouse (analytical database for domain events)
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: alo-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "default"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./db/clickhouse:/docker-entrypoint-initdb.d:ro
    networks:
      - alo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  keycloak_data:
    driver: local
  keycloak_postgres_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  quickwit_data:
    driver: local

networks:
  alo-network:
    driver: bridge
