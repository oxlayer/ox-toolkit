receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # Logs to Quickwit
  otlp/quickwit:
    endpoint: quickwit:7281
    tls:
      insecure: true
    compression: gzip

  # Traces to Quickwit (Jaeger storage)
  otlp/jaeger:
    endpoint: quickwit:7281
    tls:
      insecure: true

  # Metrics to Prometheus (via OTLP collector)
  prometheus:
    endpoint: "0.0.0.0:8889"
    const_labels:
      environment: "development"

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/quickwit]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
