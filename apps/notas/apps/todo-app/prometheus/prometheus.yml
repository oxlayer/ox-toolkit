# Prometheus configuration for Todo API metrics scraping

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'oxlayer-dev'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Job for scraping Todo API metrics
  - job_name: 'todo-api'
    static_configs:
      - targets:
          # Target the todo-app service (when running in Docker)
          - 'host.docker.internal:3001'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Job for scraping Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Job for scraping Node Exporter (if you add it)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

  # Job for scraping cAdvisor (container metrics)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
