# Nginx reverse proxy for Keycloak
# Adds Cross-Origin-Resource-Policy header for COEP compliance

server {
    listen 8080;
    server_name _;

    # Main Keycloak proxy (port 8080 - for direct access)
    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add CORP header for COEP compliance
        add_header Cross-Origin-Resource-Policy cross-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
    }
}

server {
    listen 8081;
    server_name _;

    # Alternative Keycloak proxy (port 8081 - for frontend with COEP)
    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add CORP header for COEP compliance
        add_header Cross-Origin-Resource-Policy cross-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
    }
}

