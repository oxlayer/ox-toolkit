name: Build CLI Tools

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - v2
    paths:
      - 'cli/**'
  pull_request:
    branches:
      - main
      - develop
      - v2
    paths:
      - 'cli/**'

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.28.1'

jobs:
  build:
    name: Build CLI Tools
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-cli-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-cli-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI tools
        run: |
          pnpm --filter "@oxlayer/create-backend" run build || true
          pnpm --filter "@oxlayer/create-frontend" run build || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-tools-artifacts
          path: |
            cli/create-backend/dist/**
            cli/create-frontend/dist/**
