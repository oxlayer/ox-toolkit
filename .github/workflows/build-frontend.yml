name: Build Frontend SDK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - v2
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - main
      - develop
      - v2
    paths:
      - 'frontend/**'

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  build:
    name: Build Frontend Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-frontend-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-frontend-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Frontend packages
        run: |
          pnpm --filter "@oxlayer/capabilities-web" run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sdk-artifacts
          path: |
            frontend/capabilities-web/dist/**
