name: Build Backend SDK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - v2
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
      - develop
      - v2
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.28.1'

jobs:
  build:
    name: Build Backend Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-backend-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-backend-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean previous builds
        run: pnpm --filter @oxlayer/backend run clean

      - name: Build in order
        run: pnpm --filter @oxlayer/backend run rebuild:ordered

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-sdk-artifacts
          path: |
            backend/foundation/**/dist/**
            backend/capabilities/**/dist/**
            backend/capabilities-web/**/dist/**
            backend/pro/**/dist/**
            backend/cli/**/dist/**
            backend/snippets/**/dist/**

  test:
    name: Test Backend Packages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-backend-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-backend-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          pnpm --filter "@oxlayer/foundation-*" run test || true
          pnpm --filter "@oxlayer/capabilities-*" run test || true
