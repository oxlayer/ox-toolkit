services:

  postgres:
    image: postgres:16-alpine
    container_name: oxlayer-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["pg_isready","-U","postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oxlayer-network

  redis:
    image: redis:7-alpine
    container_name: oxlayer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oxlayer-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: oxlayer-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["rabbitmq-diagnostics","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oxlayer-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: oxlayer-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KC_SPI_OPTIONS_COOKIE_DEFAULT_SECURE: false
      KC_SPI_OPTIONS_COOKIE_DEFAULT_SAME_SITE: lax
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - keycloak_postgres_data:/opt/keycloak/data
    depends_on:
      keycloak-postgres:
        condition: service_started
    healthcheck:
      test: ["wget","--quiet","--tries=1","--spider","http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - oxlayer-network

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: oxlayer-keycloak-postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - oxlayer-network

  keycloak-proxy:
    image: nginx:alpine
    container_name: oxlayer-keycloak-proxy
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - oxlayer-network

  influxdb:
    image: influxdb:2.7-alpine
    container_name: oxlayer-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: oxlayer
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-auth-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/var/lib/influxdb2
    networks:
      - oxlayer-network

  grafana:
    image: grafana/grafana:12.3.1
    container_name: oxlayer-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: https://github.com/quickwit-oss/quickwit-datasource/releases/download/v0.5.0/quickwit-quickwit-datasource-0.5.0.zip;quickwit
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - oxlayer-network

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: oxlayer-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - oxlayer-network

  otel-collector-observability:
    image: otel/opentelemetry-collector-contrib:0.143.0
    container_name: oxlayer-otel-collector-observability
    ports:
      - "14317:4317"
      - "14318:4318"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      quickwit:
        condition: service_started
    networks:
      - oxlayer-network

  otel-collector-domain:
    image: otel/opentelemetry-collector-contrib:0.143.0
    container_name: oxlayer-otel-collector-domain
    ports:
      - "24317:4317"
      - "24318:4318"
      - "18888:8888"
      - "18889:8889"
    depends_on:
      clickhouse:
        condition: service_started
    networks:
      - oxlayer-network

  quickwit:
    image: quickwit/quickwit:0.8.2
    container_name: oxlayer-quickwit
    command: ["run"]
    environment:
      QW_ENABLE_OPENTELEMETRY_OTLP_EXPORTER: true
      QW_METASTORE_URI: file:///quickwit/data/qw.metastore
      QW_DATA_DIR: /quickwit/data
      QW_JAEGER_STORAGE_ENABLED: true
    ports:
      - "7280:7280"
      - "7281:7281"
    volumes:
      - quickwit_data:/quickwit/data
    networks:
      - oxlayer-network

  jaeger-query:
    image: jaegertracing/jaeger-query:1.52
    container_name: oxlayer-jaeger-query
    environment:
      SPAN_STORAGE_TYPE: grpc-plugin
      GRPC_STORAGE_SERVER: quickwit:7281
      GRPC_STORAGE_TLS: false
    ports:
      - "16686:16686"
      - "16687:16687"
    depends_on:
      quickwit:
        condition: service_started
    networks:
      - oxlayer-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: oxlayer-clickhouse
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/lib/clickhouse
    networks:
      - oxlayer-network

  minio:
    image: minio/minio:RELEASE.2024-03-30T09-41-56Z
    container_name: oxlayer-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - oxlayer-network

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: oxlayer-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - oxlayer-network

  mongodb:
    image: mongo:7.0
    container_name: oxlayer-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: todo_app
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/db
    networks:
      - oxlayer-network

  emqx:
    image: emqx/emqx:5.6.0
    container_name: oxlayer-emqx
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: admin123
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/data
    networks:
      - oxlayer-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  keycloak_data:
    driver: local
  keycloak_postgres_data:
    driver: local
  keycloak_postgres_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  quickwit_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  minio_data:
    driver: local
  qdrant_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  emqx_data:
    driver: local
  emqx_log:
    driver: local

networks:
  oxlayer-network:
    driver: bridge