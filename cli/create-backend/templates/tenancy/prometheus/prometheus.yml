# Prometheus configuration for {{PROJECT_NAME}}

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: '{{PROJECT_SLUG}}-api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
